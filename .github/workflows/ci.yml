name: CI

on:
  pull_request:
    branches: [production]
  push:
    branches: [production]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Verify Expo config
        run: npx expo config --type public
