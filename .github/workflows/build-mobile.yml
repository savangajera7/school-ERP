name: Build Mobile (Android & iOS)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: EAS build profile
        required: true
        default: production-apk
        type: choice
        options:
          - preview
          - production
          - production-apk
  push:
    tags:
      - "v*"
  schedule:
    # Optional weekly preview APK for internal testing
    - cron: "0 4 * * 1"

jobs:
  eas-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve platform
        id: platform
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.platform }}" >> $GITHUB_OUTPUT
            echo "profile=${{ inputs.profile }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "value=android" >> $GITHUB_OUTPUT
            echo "profile=preview" >> $GITHUB_OUTPUT
          else
            echo "value=all" >> $GITHUB_OUTPUT
            echo "profile=production-apk" >> $GITHUB_OUTPUT
          fi

      - name: EAS Build
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          export EXPO_PUBLIC_API_URL="${EXPO_PUBLIC_API_URL:-https://schoolmanagement.mahispark.com}"
          eas build \
            --platform ${{ steps.platform.outputs.value }} \
            --profile ${{ steps.platform.outputs.profile }} \
            --non-interactive \
            --wait

      - name: Trigger download deploy (Android APK/AAB)
        if: steps.platform.outputs.value == 'android' || steps.platform.outputs.value == 'all'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "deploy-downloads.yml",
              ref: context.ref,
            });
