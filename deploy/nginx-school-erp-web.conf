# Teacher / Admin web — School ERP (Expo web export)
# Install on server:
#   sudo cp /tmp/nginx-school-erp-web.conf /etc/nginx/sites-available/school-erp-web
#   sudo ln -sf /etc/nginx/sites-available/school-erp-web /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name app.schoolmanagement.mahispark.com;

    root /var/www/school-erp-web;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_expo/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
